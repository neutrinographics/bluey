name: bluey
description: A modern, elegant Bluetooth Low Energy library for Flutter
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.11.0
  clock: any
  bluey_platform_interface:
    path: ../bluey_platform_interface
  bluey_android:
    path: ../bluey_android
  bluey_ios:
    path: ../bluey_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: any

flutter:
  plugin:
    platforms:
      android:
        default_package: bluey_android
      ios:
        default_package: bluey_ios
